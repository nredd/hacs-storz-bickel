name: CI

# Single CI workflow for the integration. Combines what used to live in
# ci.yml + validate.yml + ha-version-sync-check.yml:
#   * smoke           lint + type + test, run INSIDE the real devcontainer image
#   * hassfest        Home Assistant integration manifest validation
#   * hacs            HACS repository validation
#   * ha-version-sync HA release-train consistency across version sources
#
# Release automation (release-please.yml) and issue triage (auto-assign.yml) live
# in their own workflows — different triggers and concerns.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Daily — keeps hassfest/HACS validation honest as upstream rules evolve.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  smoke:
    name: Smoke (devcontainer)
    # The whole point of this job: run script/smoke inside the SAME image the
    # devcontainer builds, so CI and local dev share one environment. The image is
    # cached to GHCR (built+pushed on main, pulled via cacheFrom on PRs).
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to GitHub Container Registry
        # Only needed to PUSH the cached image, which only happens on main.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build devcontainer and run smoke
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3.1900000450
        with:
          imageName: ghcr.io/${{ github.repository }}-devcontainer
          cacheFrom: ghcr.io/${{ github.repository }}-devcontainer
          # Push the freshly built image only on main; PRs reuse it via cacheFrom.
          push: filter
          runCmd: script/smoke

  hassfest:
    # https://developers.home-assistant.io/blog/2020/04/16/hassfest
    name: Hassfest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@868e6cb4607727d764341a158d98872cd63fa658 # master

  hacs:
    # https://github.com/hacs/action
    name: HACS validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run HACS validation
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration
          # Remove this 'ignore' key once brand images are added for the integration:
          # https://developers.home-assistant.io/docs/creating_integration_file_structure/#brand-images---brand
          ignore: brands

  ha-version-sync:
    name: HA version sync
    # A lightweight consistency guard (also a pre-commit hook); no container needed.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.4"

      - name: Validate HA version sync
        run: ./script/ha-version-sync
