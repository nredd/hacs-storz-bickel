name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  quality:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.4"
          enable-cache: true
          python-version: "3.14.2"

      - name: Sync the locked environment
        run: ./script/uv-sync

      - name: Check lock file
        run: ./script/lock-check

      - name: Lint check
        run: ./script/lint-check

      - name: Type check
        run: ./script/type-check

      - name: Test
        run: ./script/test
