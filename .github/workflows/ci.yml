name: CI

# Single CI workflow for the integration. Combines what used to live in
# ci.yml + validate.yml + ha-version-sync-check.yml:
#   * smoke           lint + type + test + card gate, run INSIDE the real devcontainer
#                     image (script/smoke covers the Lovelace card via script/card-check)
#   * hassfest        Home Assistant integration manifest validation
#   * hacs            HACS repository validation
#
# Release automation (release-please.yml) and issue triage (auto-assign.yml) live
# in their own workflows — different triggers and concerns.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    # Daily — keeps hassfest/HACS validation honest as upstream rules evolve.
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  smoke:
    name: Smoke
    # Build the project's devcontainer image and run script/smoke inside it, so CI
    # and local dev share one environment. Split into explicit build / start / run
    # steps via the Dev Containers CLI so a failure points at the right phase.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        # docker-container driver is required for the GHA cache backend used below.
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Restore card Bun dependencies
        # card/node_modules lives on the bind-mounted workspace (unlike the
        # ha_venv/uv_cache named volumes below), so a plain cache works directly.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: card/node_modules
          key: bun-modules-${{ runner.os }}-${{ hashFiles('card/bun.lock') }}
          restore-keys: |
            bun-modules-${{ runner.os }}-

      - name: Restore uv package cache
        # UV_CACHE_DIR lives in a named Docker volume, not a host path, so we
        # cache a tar snapshot and seed/dump the volume around the container run.
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /tmp/docker-cache/uv-cache.tar
          key: uv-cache-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-cache-${{ runner.os }}-

      - name: Seed uv cache volume
        run: |
          set -euo pipefail
          echo "VOLUME_PREFIX=$(basename "$GITHUB_WORKSPACE")" >> "$GITHUB_ENV"
          mkdir -p /tmp/docker-cache
          docker volume create "$(basename "$GITHUB_WORKSPACE")_uv_cache"
          if [ -f /tmp/docker-cache/uv-cache.tar ]; then
            docker run --rm \
              -v "$(basename "$GITHUB_WORKSPACE")_uv_cache":/target \
              -v /tmp/docker-cache:/backup \
              alpine tar -xf /backup/uv-cache.tar -C /target
          fi

      - name: Install devcontainer CLI
        # TODO(redd): delete??
        run: npm install -g @devcontainers/cli@0.87.0

      - name: Build
        run: |
          devcontainer build --workspace-folder . \
            --cache-from type=gha \
            --cache-to type=gha,mode=max

      - name: Start
        run: devcontainer up --workspace-folder .

      - name: Smoke
        run: devcontainer exec --workspace-folder . script/smoke

      - name: Dump uv cache volume
        if: always()
        run: |
          docker run --rm \
            -v "${VOLUME_PREFIX}_uv_cache":/source \
            -v /tmp/docker-cache:/backup \
            alpine tar -cf /backup/uv-cache.tar -C /source .

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  hassfest:
    # https://developers.home-assistant.io/blog/2020/04/16/hassfest
    name: Hassfest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate
        uses: home-assistant/actions/hassfest@f4ca6f671bd429efb108c0f2fa0ae8af0215986c # master

  hacs:
    # https://github.com/hacs/action
    name: HACS validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate
        uses: hacs/action@d556e736723344f83838d08488c983a15381059a # 22.5.0
        with:
          category: integration
          # Remove this 'ignore' key once brand images are added for the integration:
          # https://developers.home-assistant.io/docs/creating_integration_file_structure/#brand-images---brand
          ignore: brands
